# git-cliff configuration - used to automatically generate changelogs since the last tag for Sterm releases.
#
# Design principles:
# - Group by conventional commit types (feat/fix/refactor/docs/test/build/ci/ui/perf/chore).
# - Retain scope as a bold prefix `**(scope)**` for quick scanning (ai/ssh/i18n/linux/...).
# - Skip noisy commits like merges, pure release chores, reverts, etc.
# - Unconventional commits fall back to the "Others" group to avoid losing information.
# - Output a clean fragment (no H1 header or date block), which the workflow prepends below the release body description.

[changelog]
# Do not output H1 header '# Changelog'; the publish_release step handles the overall layout.
header = ""

body = """
{%- if previous %}
{%- if previous.version %}
**Change Range**: [`{{ previous.version }}` … `{{ version }}`]({{ self::compare_url(prev=previous.version, curr=version) }})

{% endif -%}
{%- endif -%}
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | upper_first }}

{% for commit in commits -%}
- {% if commit.scope %}**({{ commit.scope }})** {% endif %}{{ commit.message | split(pat="\n") | first | trim }}{% if commit.id %} ([`{{ commit.id | truncate(length=7, end="") }}`]({{ self::commit_url(sha=commit.id) }})){% endif %}
{% endfor %}
{% endfor %}
{%- macro compare_url(prev, curr) -%}
https://github.com/zerx-lab/warp/compare/{{ prev }}...{{ curr }}
{%- endmacro -%}
{%- macro commit_url(sha) -%}
https://github.com/zerx-lab/warp/commit/{{ sha }}
{%- endmacro -%}
"""

# The comparison footer between tags is output by compare_url in the template, so no extra footer is appended here.
footer = ""

trim = true

[git]
# If parsing conventional commits fails, do not error; fallback to the default group in commit_parsers.
conventional_commits = true
filter_unconventional = false
# Do not split multi-line bodies - one commit per record.
split_commits = false

# Tag naming pattern: v prefix + any suffix (e.g. v2026.05.27.2 / v2026.05.06.preview).
tag_pattern = "v[0-9].*"

# Order by commit appearance in git log (newest first) to maintain readability.
topo_order = false
sort_commits = "newest"

# Ignore merges / internal release tags that are meaningless to users.
commit_preprocessors = [
    # Remove the PR number in parentheses at the end of the first line to avoid duplication with the hash link.
    # Use (?m) to anchor $ to the end of each line (commit subject is the first line), not the end of the entire message.
    { pattern = '(?m) \(#[0-9]+\)$', replace = "" },
    # Remove the gitmoji prefix from the start of the commit subject (e.g. "♻️ refactor: ..."),
    # otherwise group rules like ^refactor will not match and fall back to "Others".
    { pattern = '^(♻️|✨|🐛|🎨|🚀|🔥|💄|📝|🛠|⚡|🚧|🐳|🔧|🚨|✅|♿|🔒)[️]?\s*', replace = "" },
]

# Order sensitive: the first match takes effect. Put noise skips at the top.
commit_parsers = [
    # Noise: skip
    { message = "^[Mm]erge ", skip = true },
    { message = "^[Rr]evert ", skip = true },
    { message = "^[Bb]ump ", skip = true },
    { message = "^chore\\(release\\)", skip = true },
    { message = "^chore: release", skip = true },
    { message = "^v[0-9]+\\.", skip = true },

    # conventional commit main groups (English titles)
    { message = "^feat", group = "✨ New Features" },
    { message = "^fix", group = "🐛 Bug Fixes" },
    { message = "^perf", group = "⚡ Performance" },
    { message = "^refactor", group = "♻️ Refactoring" },
    { message = "^ui", group = "🎨 Styling" },
    { message = "^style", group = "🎨 Styling" },
    { message = "^test", group = "🧪 Testing" },
    { message = "^docs", group = "📝 Documentation" },
    { message = "^(build|ci|chore)", group = "🛠 Build System & Chores" },

    # Fallback: keep other commit types under "Others" group
    { message = ".*", group = "📦 Others" },
]
